<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEBREX | Book Reading Platforms</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8faff;
      color: #111;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: #fff;
      border-radius: 16px;
      padding: 30px 15px;
      text-align: center;
      text-decoration: none;
      color: #000;
      border: 1.5px solid #e0e0e0;
      transition: all 0.3s ease;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0, 119, 255, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: width 0.5s ease, height 0.5s ease, opacity 0.4s ease;
      z-index: 0;
    }

    .card:hover::before {
      width: 300px;
      height: 300px;
      opacity: 1;
    }

    .card:hover {
      border-color: #0077ff;
      box-shadow: 0 6px 20px rgba(0, 119, 255, 0.12);
    }

    .card img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card p {
      font-size: 1rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #222;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        padding: 20px 10px;
      }

      .card img {
        width: 60px;
        height: 60px;
      }

      .card p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <h1>Book Reading Platforms</h1>
  <div class="grid">
    <a class="card" href="Amazon_Kindle.html"><img src="Amazon_Kindle.png" alt="Amazon Kindle"><p>Amazon Kindle</p></a>
    <a class="card" href="Wattpad.html"><img src="Wattpad.png" alt="Wattpad"><p>Wattpad</p></a>
    <a class="card" href="Google_Books.html"><img src="Google_Books.png" alt="Google Books"><p>Google Books</p></a>
    <a class="card" href="Project_Gutenberg.html"><img src="Project_Gutenberg.png" alt="Project Gutenberg"><p>Project Gutenberg</p></a>
    <a class="card" href="Hoopla.html"><img src="Hoopla.png" alt="Hoopla"><p>Hoopla</p></a>
    <a class="card" href="Goodreads.html"><img src="goodreads.png" alt="Goodreads"><p>Goodreads</p></a>
    <a class="card" href="Internet_Archive.html"><img src="Internet_Archive.png" alt="Internet Archive"><p>Internet Archive</p></a>
    <a class="card" href="Bookbub.html"><img src="bookbub.png" alt="Bookbub"><p>Bookbub</p></a>
    <a class="card" href="Open_Library.html"><img src="Open_Library.png" alt="Open Library"><p>Open Library</p></a>
    <a class="card" href="Manybooks.html"><img src="Manybooks.jpg" alt="Manybooks"><p>Manybooks</p></a>
  </div>
</body>
</html>
