function sendMessage() {
    const inputField = document.getElementById('user-input');
    const messageText = inputField.value;

    if (messageText.trim() === '') return;

    addMessage(messageText, 'user');
    inputField.value = '';

    fetch('chat.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'message=' + encodeURIComponent(messageText)
    })
    .then(response => response.json())
    .then(data => {
        addMessage(data.reply || "Sorry, I didn't understand that.", 'bot');
    })
    .catch(() => {
        addMessage("⚠️ Failed to connect to AI.", 'bot');
    });
}

function addMessage(text, sender) {
    const messagesContainer = document.getElementById('messages');
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', sender);
    messageDiv.textContent = text;
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

    <script>
        const menuBtn = document.getElementById('menu-toggle');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        const menuItems = document.querySelectorAll('.side-menu li');
    
        function animateItems() {
          menuItems.forEach((item, i) => {
            item.classList.remove('animate'); // Reset
            void item.offsetWidth; // Force reflow
            setTimeout(() => {
              item.classList.add('animate');
            }, i * 100); // stagger delay
          });
        }
    
        function openMenu() {
          sideMenu.classList.add('show');
          menuBtn.classList.add('active');
          overlay.classList.add('show');
          animateItems();
        }
    
        function closeMenu() {
          sideMenu.classList.remove('show');
          menuBtn.classList.remove('active');
          overlay.classList.remove('show');
          menuItems.forEach(item => item.classList.remove('animate'));
        }
    
        menuBtn.addEventListener('click', () => {
          sideMenu.classList.contains('show') ? closeMenu() : openMenu();
        });
    
        overlay.addEventListener('click', closeMenu);
    
        document.querySelectorAll('.side-menu a, .side-menu li').forEach(item => {
          item.addEventListener('click', () => {
            closeMenu();
          });
        });
    
        let touchStartX = 0;
        let touchEndX = 0;
    
        document.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
        });
    
        document.addEventListener('touchend', (e) => {
          touchEndX = e.changedTouches[0].screenX;
          const swipeDistance = touchEndX - touchStartX;
          if (swipeDistance > 50) openMenu();
          else if (swipeDistance < -50) closeMenu();
        });
      </script>    
  <script>
    function toggleDropdown() {
      const dropdown = document.getElementById('accountDropdown');
      dropdown.classList.toggle('show');
    }

    // Auto-close dropdown when clicking outside
    window.addEventListener('click', function (e) {
      const btn = document.querySelector('.account-btn');
      const dropdown = document.getElementById('accountDropdown');
      if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('show');
      }
    });
  </script>
