<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEBREX - Social Platforms</title>

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #fefefe, #f1f3f7);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1.title {
      font-size: 2.5rem;
      margin-top: 40px;
      text-align: center;
      color: #2d2d2d;
      font-weight: 700;
      letter-spacing: 1.2px;
    }

    .main-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 30px;
      padding: 50px 20px;
      width: 100%;
      max-width: 1200px;
    }

    .tool {
      background: #fff;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      color: #333;
      padding: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
    }

    .tool:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .tool::before {
      content: "";
      position: absolute;
      top: var(--y, 50%);
      left: var(--x, 50%);
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(0, 123, 255, 0.35) 0%, rgba(0, 123, 255, 0.1) 50%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .tool:hover::before {
      width: 200%;
      height: 200%;
      opacity: 1;
    }

    .tool * {
      position: relative;
      z-index: 1;
    }

    .tool-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 12px;
      transition: transform 0.3s ease;
    }

    .tool:hover .tool-icon {
      transform: scale(1.08) rotate(1.5deg);
      filter: drop-shadow(0 0 6px rgba(0, 123, 255, 0.2));
    }

    .tool-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #2d2d2d;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .tool-icon {
        width: 60px;
        height: 60px;
      }

      .tool-name {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <h1 class="title">Top Social Media Platforms</h1>

  <nav class="main-nav">
    <a href="#" class="tool" data-aos="zoom-in">
      <img src="Instagram.png" class="tool-icon" alt="Instagram" />
      <p class="tool-name">Instagram</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="50">
      <img src="Facebook.png" class="tool-icon" alt="Facebook" />
      <p class="tool-name">Facebook</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="100">
      <img src="Tiktok.png" class="tool-icon" alt="TikTok" />
      <p class="tool-name">TikTok</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="150">
      <img src="Youtube.png" class="tool-icon" alt="YouTube" />
      <p class="tool-name">YouTube</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="200">
      <img src="Snapchat.png" class="tool-icon" alt="Snapchat" />
      <p class="tool-name">Snapchat</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="250">
      <img src="WhatsApp2.png" class="tool-icon" alt="WhatsApp" />
      <p class="tool-name">WhatsApp</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="300">
      <img src="Pinterest.png" class="tool-icon" alt="Pinterest" />
      <p class="tool-name">Pinterest</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="350">
      <img src="X.jpg" class="tool-icon" alt="Twitter" />
      <p class="tool-name">Twitter</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="400">
      <img src="LinkedIn.png" class="tool-icon" alt="LinkedIn" />
      <p class="tool-name">LinkedIn</p>
    </a>

    <a href="#" class="tool" data-aos="zoom-in" data-aos-delay="450">
      <img src="Telegram.png" class="tool-icon" alt="Telegram" />
      <p class="tool-name">Telegram</p>
    </a>
  </nav>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    document.querySelectorAll('.tool').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--x', `${x}%`);
        card.style.setProperty('--y', `${y}%`);
      });
    });
  </script>
</body>
</html>
