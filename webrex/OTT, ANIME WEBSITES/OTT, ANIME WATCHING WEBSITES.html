<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEBREX | OTT & Anime Websites</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9fbff;
      color: #111;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 15px;
      text-align: center;
      text-decoration: none;
      color: #000;
      border: 1.5px solid #e0e0e0;
      transition: 0.3s ease;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0, 123, 255, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: 0.5s ease;
      z-index: 0;
    }

    .card:hover::before {
      width: 300px;
      height: 300px;
      opacity: 1;
    }

    .card:hover {
      border-color: #007bff;
      box-shadow: 0 6px 20px rgba(0, 123, 255, 0.15);
    }

    .card img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .card p {
      font-size: 1rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 768px) {
      .card img {
        width: 60px;
        height: 60px;
      }

      .card p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <h1>OTT & Anime Platforms</h1>
  <div class="grid">
    <a class="card" href="Twitch.html"><img src="Twitch.jpg" alt="Twitch"><p>Twitch</p></a>
    <a class="card" href="Netflix.html"><img src="Netflix.jpg" alt="Netflix"><p>Netflix</p></a>
    <a class="card" href="Prime_video.html"><img src="Prime_video.png" alt="Amazon Prime Video"><p>Amazon Prime Video</p></a>
    <a class="card" href="9Anime.html"><img src="nine_Anime.jpg" alt="9Anime"><p>9Anime</p></a>
    <a class="card" href="Disney.html"><img src="Disney.png" alt="Disney Hotstar"><p>Disney Hotstar</p></a>
    <a class="card" href="Crunchyroll.html"><img src="Crunchyroll.png" alt="Crunchyroll"><p>Crunchyroll</p></a>
    <a class="card" href="Zee5.html"><img src="zee5.jpg" alt="Zee5"><p>Zee5</p></a>
    <a class="card" href="JioCinema.html"><img src="JioCinema.png" alt="JioCinema"><p>JioCinema</p></a>
    <a class="card" href="YT.html"><img src="YT.jpg" alt="YouTube"><p>YouTube</p></a>
    <a class="card" href="LOCO.html"><img src="LOCO.jpg" alt="Loco"><p>Loco</p></a>
  </div>
</body>
</html>
