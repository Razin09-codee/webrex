<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEBREX | Banking Platforms</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f7ff;
      color: #111;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: #fff;
      border-radius: 16px;
      padding: 30px 15px;
      text-align: center;
      text-decoration: none;
      color: #000;
      border: 1.5px solid #e0e0e0;
      transition: all 0.3s ease;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0, 119, 255, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: width 0.5s ease, height 0.5s ease, opacity 0.4s ease;
      z-index: 0;
    }

    .card:hover::before {
      width: 300px;
      height: 300px;
      opacity: 1;
    }

    .card:hover {
      border-color: #0077ff;
      box-shadow: 0 6px 20px rgba(0, 119, 255, 0.12);
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card p {
      font-size: 1rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
      color: #222;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        padding: 20px 10px;
      }

      .card img {
        width: 60px;
        height: 60px;
      }

      .card p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <h1>Banking & Finance Websites</h1>
  <div class="grid">
    <a class="card" href="HDFC.html"><img src="HDFC.png" alt="HDFC"><p>HDFC BANK</p></a>
    <a class="card" href="ICICI.html"><img src="ICICI.jpg" alt="ICICI"><p>ICICI BANK</p></a>
    <a class="card" href="SBI.html"><img src="SBI.jpg" alt="SBI"><p>SBI BANK</p></a>
    <a class="card" href="PhonePe.html"><img src="PhonePe.png" alt="PhonePe"><p>PHONEPE</p></a>
    <a class="card" href="Axis_Bank.html"><img src="Axis_Bank.png" alt="Axis Bank"><p>AXIS BANK</p></a>
    <a class="card" href="IDFC.html"><img src="IDFC.png" alt="IDFC"><p>IDFC BANK</p></a>
    <a class="card" href="Paisabazaar.html"><img src="Paisabazaar.png" alt="Paisabazaar"><p>PAISABAZAAR</p></a>
    <a class="card" href="Kotak.html"><img src="Kotak.png" alt="Kotak"><p>KOTAK BANK</p></a>
    <a class="card" href="LIC.html"><img src="LIC.png" alt="LIC"><p>LIC BANK</p></a>
    <a class="card" href="Bank_of_Baroda.html"><img src="Bank_of_Baroda.jpg" alt="BOB"><p>BANK OF BARODA</p></a>
  </div>
</body>
</html>
