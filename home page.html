<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        @import url('https://fonts.googleapis.com/css?family=Pacifico');

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            overflow-y: hidden;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 25px;
            z-index: 1001;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-toggle span {
            display: block;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-10px) rotate(-4(-45deg));
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #111;
            padding-top: 80px;
            transition: left 0.25s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .side-menu.show {
            left: 0;
        }

        .side-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .side-menu ul li {
            opacity: 0;
            transform: translateX(-20px);
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            color: white;
            cursor: pointer;
        }

        .side-menu li.animate {
            animation: slideIn 0.8s forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .side-menu li:hover {
            background-color: #333;
        }

        .side-menu a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .content {
            text-align: center;
            padding-top: 150px;
            font-family: 'Creepster', cursive;
            font-size: 3rem;
        }

        .diwaloween {
            height: 17.8cm;
            width: 40cm;
            position: relative;
            bottom: 0.8cm;
            left: -0.2cm;
        } 

        #search {

            height: 25px;
            padding: 5px;
            border: none;
            outline: none;

            color: gray;
            position: relative;
            bottom: 8.5cm;

        }

        #search:hover {

        }

        .chatbox {

            bottom: 20px;

            background-color: #222;
            color: white;
            border-radius: 10px;

        }

        .chatbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #333;
            border-bottom: 1px solid #444;
        }

        .chatbox-body {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
        }

        #user-input {

            padding: 10px;
            border: none;
            background-color: #333;
            color: white;
        }

        #send-btn {

            color: white;

        }

        .message {

            border-radius: 5px;

        .user {

        }

        .bot {

        }  
        
        .design {
            font-family: 'Pacifico', cursive;
        }

        .searchqu {
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 10px; 
            font-family: Georgia, 'Times New Roman', Times, serif; 
            position: relative;
            bottom: 10cm;
            transform: scale(2);
        }

        .all-quart {
            font-size: x-large;
            position: relative;
            bottom: 4cm;
        }

        .search-icon {
            transform: scale(0.1);
            position: relative;
            bottom: 179mm;

        .account-wrapper {

            top: 20px;
            right: 20px;

        .account-btn {

            height: 48px;
            border-radius: 50%;

            overflow: hidden;

        .account-btn:hover {

        }

        .account-img {
            width: 100%;

            object-fit: cover;
            border-radius: 50%;
        }

        .dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            min-width: 160px;
            animation: fadeSlideDown 0.3s ease forwards;
        }

        .dropdown a {
            padding: 12px 18px;
            text-decoration: none;
            color: white;
            border-bottom: 1px solid #333;
            transition: background 0.2s ease;
            font-size: 15px;
        }

        .dropdown a:last-child {
            border-bottom: none;
        }

        .dropdown a:hover {
            background-color: #333;
            border-radius: 1mm;
        }

        .dropdown.show {
            display: flex;
        }

        #toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1;
        }

        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="BODY">

    <div id="overlay"></div>

    <div class="chatbox" id="chatbox">
        <div class="chatbox-header">
            <h3>WEBREX Assistant</h3>

    <div class="all-quart">
        <h2 class="searchqu">WEBREX</h2>

        <button class="account-btn" onclick="toggleDropdown()">
            <img src="account.png" class="account-img" alt="Account">
        </button>
        <div class="dropdown" id="accountDropdown">
            <a href="http://localhost/web/signup.html">Sign Up</a>

        </div>
    </div>

    <script>
        // ⚠️ BACKEND ROUTING ADDRESS
        // Replace this URL string with your exact Render app web service address once deployed
        const BACKEND_URL = "https://webrex-1.onrender.com";

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const statusPanel = document.getElementById('status-panel');
        const statusMessages = document.getElementById('status-messages');

        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });

        function logStatus(text, isError = false) {
            const p = document.createElement('p');
            p.className = isError ? 'text-red-400' : 'text-cyan-400';
            p.textContent = `> ${text}`;
            statusMessages.appendChild(p);
            statusMessages.scrollTop = statusMessages.scrollHeight;
        }

        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            statusMessages.innerHTML = '';
            statusPanel.classList.remove('hidden');
            logStatus(`Initiating compilation array for: "${query}"`);

            try {
                // Post data to the remote Render PHP node
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'message=' + encodeURIComponent(`Generate a Top 10 webpage response array for: ${query}`)
                });

                if (!response.ok) throw new Error(`Server returned response cluster status ${response.status}`);

                const data = await response.json();
                
                if (data.html_payload) {
                    logStatus("Success! Executing dynamic document viewport build...");
                    
                    const newWindow = window.open();
                    if (newWindow) {
                        newWindow.document.open();
                        newWindow.document.write(data.html_payload);
                        newWindow.document.close();
                    } else {
                        logStatus("Popup blocked! Enable permissions to view generation layout.", true);
                    }
                } else {
                    logStatus(data.reply || "Engine failed to process valid grid sequence.", true);
                }
            } catch (err) {
                logStatus(`Sync Failure: ${err.message}`, true);
            }
        }
    </script>
