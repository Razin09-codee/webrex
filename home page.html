<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBREX - AI Search Engine Portal</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- AOS (Animate on Scroll) CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .chat-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
        }
        .chat-container.open {
            max-height: 1000px;
            transition: max-height 1s ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- MAIN PORTAL CARD -->
    <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-8 max-w-2xl w-full text-center" data-aos="zoom-in">
        <h1 class="text-5xl font-black text-gray-800 mb-2 tracking-tight">WEBREX</h1>
        <p class="text-gray-600 mb-8 font-medium">The Infinite AI-Driven Web Space</p>

        <!-- SEARCH BAR -->
        <div class="relative w-full max-w-md mx-auto mb-6">
            <input type="text" id="search-input" placeholder="Search a Top 10 category..." 
                   class="w-full px-6 py-4 rounded-full border border-gray-300 focus:outline-none focus:ring-4 focus:ring-blue-300 text-lg shadow-sm transition-all">
            <button id="search-btn" class="absolute right-3 top-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-full transition-colors">
                Search
            </button>
        </div>
    </div>

    <!-- CHAT INTERACTIVE FEEDBACK PANEL -->
    <div id="chat-panel" class="chat-container max-w-2xl w-full mt-6 bg-white rounded-2xl shadow-2xl">
        <div class="p-4 bg-gray-800 text-white rounded-t-2xl font-bold flex justify-between items-center">
            <span>WEBREX Core Engine</span>
            <span class="h-3 w-3 bg-green-500 rounded-full animate-ping"></span>
        </div>
        <div id="chat-messages" class="p-6 max-h-96 overflow-y-auto space-y-4 text-left text-gray-700">
            <!-- Messages will render dynamically here -->
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Scroll Animations
        AOS.init();

        // CONFIGURATION: Replace this safely with your actual Google Gemini API Key
        const GEMINI_API_KEY = "AQ.Ab8RN6LuTAlNvZcM8QCnFTOAQJfIWGsQTS5rGgyeUZ0aZ2-Nxw";
        const GEMINI_MODEL = "gemini-2.5-flash"; // Using 2.5-flash for speed and structural generation

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const chatPanel = document.getElementById('chat-panel');
        const chatMessages = document.getElementById('chat-messages');

        // Trigger action on click or keypress
        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-3.5 rounded-xl max-w-[85%] ${
                sender === 'user' 
                ? 'bg-blue-100 text-blue-900 ml-auto text-right' 
                : 'bg-gray-100 text-gray-800'
            }`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            // Clear old chat logs and show panel
            chatMessages.innerHTML = '';
            searchInput.value = '';
            chatPanel.classList.add('open');

            addMessage(`Searching for: "${query}"`, 'user');
            addMessage(`Building custom dynamic page grid for "${query}"... please wait.`, 'system');

            try {
                // System instructions telling Gemini exactly how to design the page output
                const systemPrompt = `You are a professional frontend web generator for the platform WEBREX. 
The user searched for the topic: '${query}'. 
Generate a beautiful, modern 'Top 10' responsive grid page strictly in HTML and inline CSS.

Follow these design choices precisely:
- Use a background gradient animation: linear-gradient(to right, #f1f3f6, #dbe9f4) with 400% size.
- Title must be large, centered, and clean.
- Create a main CSS grid container with 10 custom item cards matching the topic details.
- Include smooth hover lift translation animations on the cards.
- Incorporate AOS script configurations dynamically inside the header and footer blocks.
- Every grid item anchor element must use an information href targeting back to a details route (e.g., href='info.php?item=ItemName').

CRITICAL: Output ONLY the functional standalone code wrapped within a raw HTML document starting with <!DOCTYPE html>. Do not include markdown wraps like \`\`\`html or \`\`\`.`;

                // Set up the API call direct to Google Gemini
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt + "\n\nBuild the page now." }]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`Gemini API connection error (Status ${response.status})`);
                }

                const data = await response.json();
                
                // Parse the text block from the returned API payload structure
                let htmlPayload = data.candidates[0].content.parts[0].text;

                // Strip any markdown backticks if Gemini accidentally includes them
                htmlPayload = htmlPayload.replace(/^```html\s*|```\s*$/gi, '').trim();

                addMessage("Page generation complete! Opening new workspace tab...", "system");

                // Open the new generated code cleanly in a blank tab
                setTimeout(() => {
                    const newWindow = window.open();
                    if (newWindow) {
                        newWindow.document.write(htmlPayload);
                        newWindow.document.close(); // Tells the browser parsing is finished
                    } else {
                        addMessage("Popup blocked! Please allow popups for this site to view your generated page.", "system");
                    }
                }, 1000);

            } catch (error) {
                console.error("Error communicating with Gemini:", error);
                addMessage(`Engine error: ${error.message}. Please check your API key configuration.`, "system");
            }
        }
    </script>
</body>
</html>
