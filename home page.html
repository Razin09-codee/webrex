<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBREX</title>
    <link rel="icon" href="Webrex_only.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        @import url('https://fonts.googleapis.com/css?family=Pacifico');

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            overflow-y: hidden;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 25px;
            z-index: 1001;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-toggle span {
            display: block;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #111;
            padding-top: 80px;
            transition: left 0.25s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .side-menu.show {
            left: 0;
        }

        .side-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .side-menu ul li {
            opacity: 0;
            transform: translateX(-20px);
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            color: white;
            cursor: pointer;
        }

        .side-menu li.animate {
            animation: slideIn 0.8s forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .side-menu li:hover {
            background-color: #333;
        }

        .side-menu a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .content {
            text-align: center;
            padding-top: 150px;
            font-family: 'Creepster', cursive;
            font-size: 3rem;
        }

        .diwaloween {
            height: 17.8cm;
            width: 40cm;
            position: relative;
            bottom: 0.8cm;
            left: -0.2cm;
        } 

        #search {
            width: 300px;
            height: 25px;
            padding: 5px;
            border: none;
            outline: none;
            transition: width 0.4s ease-in-out;
            background-color: black;
            color: gray;
            position: relative;
            bottom: 8.5cm;
            left: 14cm;
        }

        #search:hover {
            box-shadow: 0 0 8px lightblue;
        }

        #search::placeholder {
            padding: 5px;
        }

        .chatbox {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 300px;
            height: 400px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #222;
            color: white;
            border-radius: 10px;
            border: 1px solid #444;
            z-index: 2;
        }

        .chatbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #333;
            border-bottom: 1px solid #444;
        }

        .chatbox-body {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
        }

        #user-input {
            width: calc(100% - 20px);
            padding: 10px;
            border: none;
            background-color: #333;
            color: white;
        }

        #send-btn {
            padding: 10px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        .user {
            background-color: #444;
        }

        .bot {
            background-color: #666;
        }  
        
        .design {
            font-family: 'Pacifico', cursive;
        }

        .searchqu {
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 10px; 
            font-family: Georgia, 'Times New Roman', Times, serif; 
            position: relative;
            bottom: 10cm;
            transform: scale(2);
        }

        .all-quart {
            font-size: x-large;
            position: relative;
            bottom: 4cm;
        }

        .search-icon {
            transform: scale(0.1);
            position: relative;
            bottom: 179mm;
            left: 18cm;
        }

        .account-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }

        .account-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid black;
            background-color: #000;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .account-btn:hover {
            transform: scale(1.05);
        }

        .account-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            min-width: 160px;
            animation: fadeSlideDown 0.3s ease forwards;
        }

        .dropdown a {
            padding: 12px 18px;
            text-decoration: none;
            color: white;
            border-bottom: 1px solid #333;
            transition: background 0.2s ease;
            font-size: 15px;
        }

        .dropdown a:last-child {
            border-bottom: none;
        }

        .dropdown a:hover {
            background-color: #333;
            border-radius: 1mm;
        }

        .dropdown.show {
            display: flex;
        }

        #toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1;
        }

        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="BODY">

    <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
  
    <nav class="side-menu" id="side-menu">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="website-news.html">WEBSITE NEWS</a></li>
            <li><a href="https://razin09-2.github.io/untitled-1/">GAME</a></li>
            <li><a href="about-us.html">ABOUT US</a></li>
            <li><a href="http://localhost/pppp/feedbackq.html">FEEDBACK</a></li>
            <li><a href="#">CONTACT US</a></li>
        </ul>
    </nav>
  
    <div id="overlay"></div>
    <img src="dehnghdfghb (1).jpg" class="diwaloween" alt="Background Banner">
    
    <input type="text" id="search" placeholder="Search WEBREX AI...">
    
    <button id="toggle-btn">🎃</button>

    <div class="chatbox" id="chatbox">
        <div class="chatbox-header">
            <h3>WEBREX Assistant</h3>
            <button id="close-btn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="chatbox-body" id="chatbox-body">
            <div id="messages"></div>
        </div>
        <div style="display: flex;">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div class="all-quart">
        <h2 class="searchqu">WEBREX</h2>
    </div>
    
    <img src="search.png" class="search-icon" alt="Search Icon">
    
    <div class="account-wrapper">
        <button class="account-btn" onclick="toggleDropdown()">
            <img src="account.png" class="account-img" alt="Account">
        </button>
        <div class="dropdown" id="accountDropdown">
            <a href="http://localhost/web/signup.html">Sign Up</a>
            <a href="http://localhost/web/login.html">Log In</a>
        </div>
    </div>

    <script>
        // CONFIGURATION: Replace with your actual Google Gemini API Key
        const GEMINI_API_KEY = "AQ.Ab8RN6LuTAlNvZcM8QCnFTOAQJfIWGsQTS5rGgyeUZ0aZ2-Nxw";
        const GEMINI_MODEL = "gemini-2.5-flash";

        // Helper function to hit Gemini API directly from Frontend
        async function fetchFromGemini(promptText) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });
            if (!response.ok) throw new Error(`API returned status code: ${response.status}`);
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // AI Dynamic Search Logic via Search Input Element
        document.getElementById('search').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query === '') return;

                const chatbox = document.getElementById('chatbox');
                chatbox.style.display = 'flex';
                
                addMessage(`Searching and building section for: "${query}"...`, 'user');
                this.value = ''; 

                const systemPrompt = `You are a professional frontend web generator for the platform WEBREX. 
The user searched for the topic: '${query}'. 
Generate a beautiful, modern 'Top 10' responsive grid page strictly in HTML and inline CSS.

Follow these design choices precisely:
- Use a background gradient animation: linear-gradient(to right, #f1f3f6, #dbe9f4) with 400% size.
- Title must be large, centered, and clean.
- Create a main CSS grid container with 10 custom item cards matching the topic details.
- Include smooth hover lift translation animations on the cards.
- Incorporate AOS script configurations dynamically inside the header and footer blocks.
- Every grid item anchor element must use an information href targeting back to a details route (e.g., href='info.php?item=ItemName').

CRITICAL: Output ONLY the functional standalone code wrapped within a raw HTML document starting with <!DOCTYPE html>. Do not include markdown wraps like \`\`\`html or \`\`\`.`;

                try {
                    let htmlPayload = await fetchFromGemini(systemPrompt + "\n\nBuild the page now.");
                    htmlPayload = htmlPayload.replace(/^```html\s*|```\s*$/gi, '').trim();

                    addMessage("✨ Section rendered successfully! Opening page...", 'bot');
                    
                    const newWindow = window.open();
                    if (newWindow) {
                        newWindow.document.open();
                        newWindow.document.write(htmlPayload);
                        newWindow.document.close();
                    } else {
                        addMessage("⚠️ Popup blocked! Please allow popups to open the dynamic view panel.", 'bot');
                    }
                } catch (error) {
                    addMessage("⚠️ Failed to parse dynamic layout sequence from WEBREX engine.", 'bot');
                    console.error(error);
                }
            }
        });

        // Chat UI Component Triggers
        document.getElementById('toggle-btn').addEventListener('click', function () {
            const chatbox = document.getElementById('chatbox');
            chatbox.style.display = chatbox.style.display === 'flex' ? 'none' : 'flex';
        });

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('user-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('close-btn').addEventListener('click', function () {
            document.getElementById('chatbox').style.display = 'none';
        });

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();

            if (messageText === '') return;

            addMessage(messageText, 'user');
            inputField.value = '';

            try {
                const chatbotPrompt = `You are the friendly AI assistant for the WEBREX portal. Answer briefly: ${messageText}`;
                const reply = await fetchFromGemini(chatbotPrompt);
                addMessage(reply, 'bot');
            } catch (error) {
                addMessage("⚠️ Sync interruption: Failed to contact AI node.", 'bot');
                console.error(error);
            }
        }

        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Dropdown Navigation Elements
        function toggleDropdown() {
            document.getElementById('accountDropdown').classList.toggle('show');
        }

        window.addEventListener('click', function (e) {
            const btn = document.querySelector('.account-btn');
            const dropdown = document.getElementById('accountDropdown');
            if (btn && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });

        // Responsive Sliding Drawer System
        const menuBtn = document.getElementById('menu-toggle');
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        const menuItems = document.querySelectorAll('.side-menu li');
    
        function animateItems() {
            menuItems.forEach((item, i) => {
                item.classList.remove('animate'); 
                void item.offsetWidth; 
                setTimeout(() => {
                    item.classList.add('animate');
                }, i * 100); 
            });
        }
    
        function openMenu() {
            sideMenu.classList.add('show');
            menuBtn.classList.add('active');
            overlay.classList.add('show');
            animateItems();
        }
    
        function closeMenu() {
            sideMenu.classList.remove('show');
            menuBtn.classList.remove('active');
            overlay.classList.remove('show');
            menuItems.forEach(item => item.classList.remove('animate'));
        }
    
        menuBtn.addEventListener('click', () => {
            sideMenu.classList.contains('show') ? closeMenu() : openMenu();
        });
    
        overlay.addEventListener('click', closeMenu);
    
        document.querySelectorAll('.side-menu a, .side-menu li').forEach(item => {
            item.addEventListener('click', closeMenu);
        });
    
        let touchStartX = 0;
        let touchEndX = 0;
    
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
    
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchEndX - touchStartX;
            if (swipeDistance > 50) openMenu();
            else if (swipeDistance < -50) closeMenu();
        });
    </script>
</body>
</html>
